<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS Field Report</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f7fb;
}

.wrap {
  max-width:760px;
  margin:30px auto;
  padding:20px;
  background:white;
  border-radius:16px;
}

h1 { margin:0 0 6px; }

.sub { color:#666; margin-bottom:20px; }

input, select, textarea {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:6px;
}

textarea { min-height:120px; }

.grid {
  display:grid;
  gap:12px;
}

.g2 {
  grid-template-columns:1fr 1fr;
}

button {
  padding:12px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.primary {
  background:#1f6feb;
  color:white;
}

.secondary {
  background:#eee;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Real-Time EHS Field Report</h1>
<p class="sub">Boots-on-ground awareness. Real accountability.</p>

<form id="reportForm">

<div class="grid g2">
  <div>
    <label>Name *</label>
    <input id="workerName" required>
  </div>

  <div>
    <label>Date *</label>
    <select id="reportDate" required></select>
  </div>
</div>

<div class="grid g2">
  <div>
    <label>Time *</label>
    <input id="reportTime" type="time" required>
  </div>

  <div>
    <label>Type *</label>
    <select id="reportType" required>
      <option value="">Select one</option>
      <option>Injury / Illness</option>
      <option>Vehicle Incident</option>
      <option>Property Damage</option>
      <option>Near Miss</option>
      <option>Hazardous Condition</option>
      <option>Environmental</option>
      <option>Stop Control</option>
      <option>Safety Recognition</option>
    </select>
  </div>
</div>

<label>Details *</label>
<textarea id="details" required></textarea>

<label>Immediate Actions</label>
<textarea id="immediateActions"></textarea>

<br>

<button class="primary" type="submit">Submit</button>
<button class="secondary" type="button" id="clearBtn">Clear</button>

</form>
</div>

<script>

const form = document.getElementById('reportForm');
const dateSelect = document.getElementById('reportDate');

function populateDates() {
  const today = new Date();
  dateSelect.innerHTML = "";

  for (let i = -7; i <= 30; i++) {
    const d = new Date();
    d.setDate(today.getDate() + i);

    const iso = d.toISOString().split('T')[0];

    const opt = document.createElement('option');
    opt.value = iso;
    opt.textContent = iso;

    if (i === 0) opt.selected = true;

    dateSelect.appendChild(opt);
  }
}

function setTime() {
  const now = new Date();
  document.getElementById('reportTime').value =
    now.toTimeString().slice(0,5);
}

function clearForm() {
  form.reset();
  populateDates();
  setTime();
}

form.addEventListener('submit', (e)=>{
  e.preventDefault();
  alert("Form working properly again");
  clearForm();
});

document.getElementById('clearBtn').onclick = clearForm;

populateDates();
setTime();

</script>

</body>
</html>
