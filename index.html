<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Observation Report</title>
<link rel="apple-touch-icon" href="/clean_icon_ios.png">
<link rel="icon" href="/clean_icon_ios.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
:root {
  --bg: #071225;
  --card: #0c1830;
  --line: #22314f;
  --text: #f3f6fb;
  --muted: #a8b4c7;
  --accent: #22c55e;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.wrap {
  max-width: 1180px;
  margin: 12px auto;
  padding: 0 14px;
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 28px 28px 24px;
}

h1 {
  margin: 0 0 26px;
  font-size: 2.2rem;
  line-height: 1.1;
  font-weight: 800;
}

.grid {
  display: grid;
  gap: 14px;
}

.g2 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.field {
  display: flex;
  flex-direction: column;
}

label {
  margin-bottom: 10px;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
}

input,
select {
  width: 100%;
  height: 58px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: #020817;
  color: var(--text);
  padding: 0 20px;
  font-size: 1rem;
  outline: none;
}

textarea {
  width: 100%;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: #020817;
  color: var(--text);
  padding: 16px 20px;
  font-size: 1rem;
  outline: none;
  min-height: 150px;
  resize: vertical;
}

textarea.small {
  min-height: 110px;
}

input::placeholder,
textarea::placeholder {
  color: #7f8da6;
}

input:focus,
select:focus,
textarea:focus {
  border-color: #d9dee8;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.08);
}

.date-field {
  position: relative;
}

.date-field input {
  padding-right: 44px;
  cursor: pointer;
}

.date-arrow {
  position: absolute;
  right: 18px;
  top: 51px;
  color: var(--muted);
  font-size: 0.8rem;
  pointer-events: none;
  line-height: 1;
}

.flatpickr-calendar {
  background: #0c1830;
  border: 1px solid var(--line);
  box-shadow: none;
}

.flatpickr-months .flatpickr-month,
.flatpickr-current-month .flatpickr-monthDropdown-months,
.flatpickr-current-month input.cur-year,
.flatpickr-weekday,
.flatpickr-day {
  color: var(--text);
}

.flatpickr-day.today {
  border-color: var(--accent);
}

.flatpickr-day.selected,
.flatpickr-day.startRange,
.flatpickr-day.endRange {
  background: var(--accent);
  border-color: var(--accent);
  color: #04110a;
}

.actions {
  margin-top: 18px;
  display: flex;
  gap: 12px;
  align-items: center;
}

button {
  padding: 14px 22px;
  border-radius: 16px;
  border: 1px solid var(--line);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
}

.primary {
  background: var(--accent);
  color: #04110a;
  border: none;
}

.secondary {
  background: #0b1529;
  color: var(--text);
}

.status {
  margin-top: 14px;
  min-height: 24px;
  color: var(--muted);
  font-size: 0.95rem;
}

.status.ok {
  color: #7ee787;
}

.status.warn {
  color: #ffb86b;
}

@media (max-width: 780px) {
  .g2 {
    grid-template-columns: 1fr;
  }

  .card {
    padding: 22px 18px 20px;
  }

  h1 {
    font-size: 1.9rem;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">
    <h1>Field Observation Report</h1>

    <form id="reportForm" action="https://formspree.io/f/mnjoqogq" method="POST">
      <input type="hidden" name="_subject" value="New Field Observation Report">
      <input type="hidden" name="_captcha" value="false">

      <div class="grid g2">
        <div class="field">
          <label for="name">Name *</label>
          <input id="name" name="Name" type="text" required>
        </div>

        <div class="field date-field">
          <label for="date">Date *</label>
          <input id="date" name="Date" type="text" required readonly>
          <span class="date-arrow">▼</span>
        </div>
      </div>

      <div class="grid g2">
        <div class="field">
          <label for="time">Time *</label>
          <input id="time" name="Time" type="time" required>
        </div>

        <div class="field">
          <label for="observationType">Observation Type *</label>
          <select id="observationType" name="Observation Type" required>
            <option value="">Select one</option>
            <option>Environmental</option>
            <option>Hazardous Condition</option>
            <option>Injury / Illness</option>
            <option>Near Miss</option>
            <option>Property Damage</option>
            <option>Safety Recognition</option>
            <option>Stop Control</option>
            <option>Vehicle Incident</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="location">Location (Specify Area) *</label>
        <input id="location" name="Location" type="text" required>
      </div>

      <div class="grid g2">
        <div class="field">
          <label for="craft">Craft *</label>
          <select id="craft" name="Craft" required>
            <option value="">Select one</option>
            <option>Boilermaker</option>
            <option>Carpenter</option>
            <option>Electrical</option>
            <option>Instrumentation</option>
            <option>Labourer</option>
            <option>Millwright</option>
            <option>Operator</option>
            <option>Painter</option>
            <option>Pipefitter</option>
            <option>Scaffolder</option>
          </select>
        </div>

        <div class="field">
          <label for="foreperson">Foreperson/Coordinator *</label>
          <input id="foreperson" name="Foreperson/Coordinator" type="text" required>
        </div>
      </div>

      <div class="field">
        <label for="details">Details *</label>
        <textarea id="details" name="Details" required></textarea>
      </div>

      <div class="field">
        <label for="immediateActions">Immediate Actions *</label>
<textarea id="immediateActions" name="Immediate Actions" class="small" required></textarea>
      </div>

      <div class="actions">
        <button class="primary" type="submit">Save</button>
        <button class="secondary" type="button" id="clearBtn">Clear</button>
      </div>

      <div id="status" class="status"></div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
const form = document.getElementById("reportForm");
const clearBtn = document.getElementById("clearBtn");
const statusEl = document.getElementById("status");
const timeInput = document.getElementById("time");

const datePicker = flatpickr("#date", {
  dateFormat: "Y-m-d",
  defaultDate: new Date(),
  allowInput: false,
  clickOpens: true
});

function setCurrentTime() {
  const now = new Date();
  timeInput.value = now.toTimeString().slice(0, 5);
}

function clearForm() {
  form.reset();
  datePicker.setDate(new Date(), true);
  setCurrentTime();
  statusEl.textContent = "";
  statusEl.className = "status";
}

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  statusEl.textContent = "Submitting report...";
  statusEl.className = "status";

  const formData = new FormData(form);

  try {
    const response = await fetch(form.action, {
      method: "POST",
      body: formData,
      headers: {
        "Accept": "application/json"
      }
    });

    if (response.ok) {
      statusEl.textContent = "Report submitted successfully.";
      statusEl.className = "status ok";
      clearForm();
    } else {
      statusEl.textContent = "Submission failed. Please try again.";
      statusEl.className = "status warn";
    }
  } catch (error) {
    statusEl.textContent = "Submission failed. Please check your connection and try again.";
    statusEl.className = "status warn";
  }
});

clearBtn.addEventListener("click", clearForm);

setCurrentTime();
</script>

</body>
</html>
