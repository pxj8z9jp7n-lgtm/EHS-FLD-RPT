<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHS Field Report</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
    }

    .wrap {
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
    }

    h1 {
      margin-bottom: 5px;
    }

    p {
      color: #666;
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }

    .primary {
      background: #1f6feb;
      color: white;
    }

    .secondary {
      background: #eee;
    }
  </style>
</head>

<body>

<div class="wrap">
  <h1>Real-Time EHS Field Report</h1>
  <p>Boots-on-ground awareness. Real accountability.</p>

  <form id="reportForm">

    <label>Name *</label>
    <input id="workerName" required />

    <label>Date *</label>
    <select id="reportDate" required></select>

    <label>Time *</label>
    <input id="reportTime" type="time" required />

    <label>Type *</label>
    <select id="reportType" required>
      <option value="">Select one</option>
      <option>Injury / Illness</option>
      <option>Vehicle Incident</option>
      <option>Property Damage</option>
      <option>Near Miss</option>
      <option>Hazardous Condition</option>
      <option>Environmental</option>
      <option>Stop Control</option>
      <option>Safety Recognition</option>
    </select>

    <label>Details *</label>
    <textarea id="details" required></textarea>

    <label>Immediate Actions</label>
    <textarea id="immediateActions"></textarea>

    <button class="primary" type="submit">Submit</button>
    <button class="secondary" type="button" id="clearBtn">Clear</button>

  </form>
</div>

<script>
  const form = document.getElementById('reportForm');
  const dateSelect = document.getElementById('reportDate');
  const clearBtn = document.getElementById('clearBtn');

  function populateDates() {
    const today = new Date();
    dateSelect.innerHTML = '<option value="">Select date</option>';

    for (let i = -7; i <= 30; i++) {
      const d = new Date();
      d.setDate(today.getDate() + i);

      const iso = d.toISOString().split('T')[0];

      const option = document.createElement('option');
      option.value = iso;
      option.textContent = iso;

      if (i === 0) option.selected = true;

      dateSelect.appendChild(option);
    }
  }

  function setCurrentTime() {
    const now = new Date();
    document.getElementById('reportTime').value =
      now.toTimeString().slice(0, 5);
  }

  function clearForm() {
    form.reset();
    populateDates();
    setCurrentTime();
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    alert("Form works again. We'll connect backend next.");
    clearForm();
  });

  clearBtn.addEventListener('click', clearForm);

  populateDates();
  setCurrentTime();
</script>

</body>
</html>
