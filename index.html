<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS Field Report</title>

<style>
:root {
  --bg: #0b1220;
  --card: #0f172a;
  --line: #1e293b;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #22c55e;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.wrap {
  max-width: 760px;
  margin: 30px auto;
}

.card {
  background: var(--card);
  border-radius: 18px;
  padding: 20px;
  border: 1px solid var(--line);
}

h1 {
  margin-bottom: 6px;
}

.sub {
  color: var(--muted);
  margin-bottom: 20px;
}

.grid {
  display: grid;
  gap: 12px;
}

.g2 {
  grid-template-columns: 1fr 1fr;
}

@media (max-width: 680px) {
  .g2 {
    grid-template-columns: 1fr;
  }
}

.field {
  display: flex;
  flex-direction: column;
}

label {
  margin-bottom: 6px;
  font-weight: 600;
}

/* 🔥 ALL INPUTS SAME SIZE */
input,
select {
  height: 52px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: #020617;
  color: white;
  padding: 0 14px;
  font-size: 14px;
}

/* 🔥 ONLY TEXT AREAS BIGGER */
textarea {
  border-radius: 12px;
  border: 1px solid var(--line);
  background: #020617;
  color: white;
  padding: 12px 14px;
  font-size: 14px;
  min-height: 140px;
}

textarea.small {
  min-height: 100px;
}

.actions {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

button {
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

.primary {
  background: var(--accent);
  color: black;
}

.secondary {
  background: #1e293b;
  color: white;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<h1>Real-Time EHS Field Report</h1>
<p class="sub">Boots-on-ground awareness. Real accountability.</p>

<form id="reportForm">

<div class="grid g2">
  <div class="field">
    <label>Name *</label>
    <input id="name" required>
  </div>

  <div class="field">
    <label>Date *</label>
    <select id="date"></select>
  </div>
</div>

<div class="grid g2">
  <div class="field">
    <label>Time *</label>
    <input id="time" type="time">
  </div>

  <div class="field">
    <label>Type *</label>
    <select id="type">
      <option>Select one</option>
      <option>Injury / Illness</option>
      <option>Vehicle Incident</option>
      <option>Property Damage</option>
      <option>Near Miss</option>
      <option>Hazardous Condition</option>
      <option>Environmental</option>
      <option>Stop Control</option>
      <option>Safety Recognition</option>
    </select>
  </div>
</div>

<div class="field">
  <label>Location (Site / Area)</label>
  <input placeholder="e.g., Mosaic Belle Plaine — Mill A">
</div>

<div class="field">
  <label>Supervisor (HSE)</label>
  <input placeholder="Full name">
</div>

<div class="grid g2">
  <div class="field">
    <label>Craft *</label>
    <input placeholder="Pipefitter / Electrician">
  </div>

  <div class="field">
    <label>Facility *</label>
    <input placeholder="e.g., Regina General ER">
  </div>
</div>

<div class="field">
  <label>Details *</label>
  <textarea></textarea>
</div>

<div class="field">
  <label>Immediate Actions</label>
  <textarea class="small"></textarea>
</div>

<div class="actions">
  <button class="primary" type="submit">Save</button>
  <button class="secondary" type="button" onclick="location.reload()">Clear</button>
</div>

</form>

</div>
</div>

<script>
const dateSelect = document.getElementById("date");

function populateDates() {
  const today = new Date();
  dateSelect.innerHTML = "";

  for (let i = -7; i <= 30; i++) {
    const d = new Date();
    d.setDate(today.getDate() + i);

    const iso = d.toISOString().split("T")[0];

    const opt = document.createElement("option");
    opt.value = iso;
    opt.textContent = iso;

    if (i === 0) opt.selected = true;

    dateSelect.appendChild(opt);
  }
}

function setTime() {
  const now = new Date();
  document.getElementById("time").value =
    now.toTimeString().slice(0,5);
}

populateDates();
setTime();
</script>

</body>
</html>
